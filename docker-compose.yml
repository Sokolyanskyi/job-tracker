services:
  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: job-tracker-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=your-secret-key-here-change-in-production
      - CORS_ORIGIN=*
    volumes:
      - ./server/data:/app/data
    networks:
      - job-tracker-network
    restart: unless-stopped

  # Frontend Next.js App
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: job-tracker-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/auth
    depends_on:
      - server
    networks:
      - job-tracker-network
    restart: unless-stopped

networks:
  job-tracker-network:
    driver: bridge
